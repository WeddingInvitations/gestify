apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: gestify
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/execution-environment: gen2
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: "100"
        run.googleapis.com/memory: "512Mi"
        run.googleapis.com/cpu: "1"
    spec:
      containerConcurrency: 80
      containers:
      - image: gcr.io/PROJECT_ID/gestify
        ports:
        - name: http1
          containerPort: 8080
        env:
        - name: NODE_ENV
          value: production
        - name: NEXT_PUBLIC_FIREBASE_API_KEY
          value: "AIzaSyBJHpAYb-P832eAQPvJL8xp3p4pHZsIEAo"
        - name: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
          value: "gestify-490112.firebaseapp.com"
        - name: NEXT_PUBLIC_FIREBASE_PROJECT_ID
          value: "gestify-490112"
        - name: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
          value: "gestify-490112.firebasestorage.app"
        - name: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
          value: "925707353742"
        - name: NEXT_PUBLIC_FIREBASE_APP_ID
          value: "1:925707353742:web:c1ba6236393f29a1d793df"
        - name: NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID
          value: "G-19DT9BH3EW"
        resources:
          limits:
            memory: "512Mi"
            cpu: "1"